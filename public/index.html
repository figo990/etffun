<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全市场ETF份额监控</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%2300b894'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%23fff' font-family='Arial' font-weight='700' font-size='16'%3EE%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/css/style.css?v=20260706-01">
</head>
<body>
<header class="header">
  <div class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">ETF</span>
      <span class="brand-main">全市场ETF</span>
      <span class="brand-sub">份额监控</span>
    </a>
    <div class="top-actions">
      <input class="search-box" id="searchInput" placeholder="搜索代码 / 名称" autocomplete="off">
      <button class="btn" id="refreshBtn">刷新</button>
      <span class="col-wrap"><button class="btn" id="colToggleBtn">列显隐</button><div id="colPanel" class="col-panel"></div></span>
      <span class="fp-wrap"><button class="btn" id="filterToggleBtn">条件选基</button><div id="filterPanel" class="filter-panel"></div></span>
      <span class="update-time" id="updateTime"></span>
      <span class="qr-wrap"><button class="btn btn-qr" id="qrBtn" title="联系方式">联系</button><div id="qrPanel" class="qr-panel"><img src="/images/contact.jpg" alt="联系方式"></div></span>
    </div>
  </div>
</header>
<div class="filter-strip">
  <div class="tab-bar">
    <span class="tab active" data-tab="etf">指数ETF</span>
    <span class="tab" data-tab="huijin">汇金观察</span>
  </div>
  <div class="filter-title">指数ETF</div>
  <label class="filter-field">交易所
    <select id="exchangeFilter"><option value="">全部</option><option value="沪">沪市</option><option value="深">深市</option></select>
  </label>
  <div class="stats-bar" id="statsBar"></div>
  <span class="stat" id="northboundInfo" style="white-space:nowrap"></span>
  <span class="stat" id="bondYieldInfo" style="white-space:nowrap;color:#718096"></span>
</div>
<div class="sector-flow" id="sectorFlowPanel" style="display:none">
  <div class="sector-flow-header" id="sectorFlowToggle">行业资金流向 <span class="sf-arrow">▸</span></div>
  <div class="sector-flow-body" id="sectorFlowBody" style="display:none">
    <div class="sf-table-wrap" id="sfTableWrap"></div>
  </div>
</div>
<div class="huijin-watch" id="huijinWatchPanel" style="display:none"></div>
<main class="table-section">
  <div class="table-wrap"><table>
    <thead id="table-head"></thead>
    <tbody id="tbody"><tr><td colspan="31" class="loading">加载数据中...</td></tr></tbody>
  </table></div>
</main>
<div class="footer">
  份额:上交所/深交所 | 行情+IOPV:东方财富 | 指数:新浪 | 净值:同花顺 | 北向:东方财富 | 期权:东方财富 | 持仓/机构:天天基金 | 汇金观察:基金定报线索
  | <a href="https://fund.eastmoney.com/" target="_blank">天天基金</a>
  <a href="/admin.html" style="color:#a0aec0;text-decoration:none" aria-label="admin">&middot;</a>
</div>

<!-- ETF Detail Modal -->
<div id="detailModal" class="modal" style="display:none">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle"></span>
      <button class="modal-close" id="detailClose">&times;</button>
    </div>
    <div class="modal-body" id="detailBody">
      <div class="detail-chart-wrap"><canvas id="klineCanvas" width="800" height="360"></canvas></div>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-hjw-chart-wrap" id="huijinTrendWrap" style="display:none">
        <div class="hjw-chart-title">汇金区间趋势</div>
        <div class="hjw-chart-note">相对披露日总份额归一化口径；趋势方向比数值更重要</div>
        <canvas id="huijinTrendCanvas" width="800" height="240"></canvas>
        <div class="hjw-chart-legend">
          <span class="hcl-item hcl-band"><i></i>区间(Y_min~Y_max)</span>
          <span class="hcl-item hcl-b"><i></i>B=S1/S0</span>
          <span class="hcl-item hcl-a"><i></i>A=H0/S0(基准)</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js?v=20260706-01"></script>
</body>
</html>
