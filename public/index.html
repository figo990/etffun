<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全市场ETF份额监控</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%2300b894'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%23fff' font-family='Arial' font-weight='700' font-size='16'%3EE%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/css/style.css?v=20260704">
</head>
<body>
<header class="header">
  <div class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">ETF</span>
      <span class="brand-main">全市场ETF</span>
      <span class="brand-sub">份额监控</span>
    </a>
    <div class="top-actions">
      <input class="search-box" id="searchInput" placeholder="搜索代码 / 名称" autocomplete="off">
      <button class="btn" id="refreshBtn">刷新</button>
      <span class="col-wrap"><button class="btn" id="colToggleBtn">列显隐</button><div id="colPanel" class="col-panel"></div></span>
      <span class="fp-wrap"><button class="btn" id="filterToggleBtn">条件选基</button><div id="filterPanel" class="filter-panel"></div></span>
      <span class="update-time" id="updateTime"></span>
    </div>
  </div>
</header>
<div class="filter-strip">
  <div class="filter-title">指数ETF</div>
  <label class="filter-field">交易所
    <select id="exchangeFilter"><option value="">全部</option><option value="沪">沪市</option><option value="深">深市</option></select>
  </label>
  <div class="stats-bar" id="statsBar"></div>
  <span class="stat" id="northboundInfo" style="white-space:nowrap"></span>
</div>
<main class="table-section">
  <div class="table-wrap"><table>
    <thead id="table-head"></thead>
    <tbody id="tbody"><tr><td colspan="31" class="loading">加载数据中...</td></tr></tbody>
  </table></div>
</main>
<div class="footer">
  份额:上交所/深交所 | 行情+IOPV:东方财富 | 指数:新浪 | 净值:同花顺 | 北向:东方财富 | 期权:东方财富 | 持仓/机构:天天基金 | 汇金:2025年报
  | <a href="https://fund.eastmoney.com/" target="_blank">天天基金</a>
  <a href="/admin.html" style="color:#a0aec0;text-decoration:none" aria-label="admin">&middot;</a>
</div>
<script src="/js/app.js"></script>
</body>
</html>
